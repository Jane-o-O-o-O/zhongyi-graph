services:
  tcm-neo4j:
    image: neo4j:5-community
    container_name: tcm-neo4j
    environment:
      NEO4J_AUTH: neo4j/tcm-kg-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  tcm-qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: tcm-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  tcm-postgres:
    image: postgres:16-alpine
    container_name: tcm-postgres
    environment:
      POSTGRES_DB: tcm_kg
      POSTGRES_USER: tcm
      POSTGRES_PASSWORD: tcm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  tcm-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: tcm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  tcm-api:
    image: python:3.11-slim
    container_name: tcm-api
    working_dir: /app/backend
    command: sh -c "pip install -e . && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - path: .env.example
      - path: .env
        required: false
    environment:
      NEO4J_URI: bolt://tcm-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: tcm-kg-password
      QDRANT_URL: http://tcm-qdrant:6333
      QDRANT_COLLECTION: tcm_knowledge
      POSTGRES_DSN: postgresql+psycopg://tcm:tcm@tcm-postgres:5432/tcm_kg
      MINIO_ENDPOINT: tcm-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: tcm-documents
      MINIO_SECURE: "false"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - tcm-neo4j
      - tcm-qdrant
      - tcm-postgres
      - tcm-minio

  tcm-web:
    image: node:20-slim
    container_name: tcm-web
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_PROXY_TARGET: http://tcm-api:8000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      - tcm-api

volumes:
  neo4j-data:
  neo4j-logs:
  qdrant-data:
  postgres-data:
  minio-data:
